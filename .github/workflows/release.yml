name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip leading "v"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Patch version and download URL in module.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          jq \
            --arg v "$VERSION" \
            --arg dl "https://github.com/${{ github.repository }}/releases/download/$TAG/aeris-bg3-rolls-t20.zip" \
            '.version = $v | .download = $dl' \
            module.json > module.patched.json
          mv module.patched.json module.json

      - name: Create ZIP
        run: |
          mkdir -p staging/aeris-bg3-rolls-t20/dist
          cp module.json           staging/aeris-bg3-rolls-t20/module.json
          cp dist/main.bundle.js   staging/aeris-bg3-rolls-t20/dist/main.bundle.js
          cd staging
          zip -r ../aeris-bg3-rolls-t20.zip aeris-bg3-rolls-t20/
          cd ..
          echo "ZIP contents:"
          unzip -l aeris-bg3-rolls-t20.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: aeris-bg3-rolls-t20.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
