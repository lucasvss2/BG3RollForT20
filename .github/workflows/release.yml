name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Patch module.json version
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Strip leading "v"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Create ZIP
        run: |
          mkdir -p staging/aeris-bg3-rolls-t20/dist
          cp module.json staging/aeris-bg3-rolls-t20/module.json
          cp dist/main.bundle.js staging/aeris-bg3-rolls-t20/dist/main.bundle.js
          cd staging
          zip -r ../aeris-bg3-rolls-t20.zip aeris-bg3-rolls-t20/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: aeris-bg3-rolls-t20.zip
