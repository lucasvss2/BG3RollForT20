name: Beta Release

on:
  push:
    branches:
      - beta

permissions:
  contents: write

jobs:
  build-and-beta-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: |
          mkdir -p staging/aeris-bg3-rolls-t20
          cp module.json           staging/aeris-bg3-rolls-t20/module.json
          cp dist/main.bundle.js   staging/aeris-bg3-rolls-t20/main.bundle.js
          if [ -d dist/assets ]; then
            cp -r dist/assets staging/aeris-bg3-rolls-t20/assets
          fi
          cd staging
          zip -r ../aeris-bg3-rolls-t20-beta.zip aeris-bg3-rolls-t20/
          cd ..
          echo "ZIP contents:"
          unzip -l aeris-bg3-rolls-t20-beta.zip

      - name: Delete existing beta-latest release and tag
        run: |
          gh release delete beta-latest --yes 2>/dev/null || true
          git push origin --delete beta-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create beta pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-latest
          name: "Beta (latest)"
          body: |
            ## Beta Build

            Versão de teste automática gerada pelo push na branch `beta`.

            **⚠️ Não use em sessões de jogo — apenas para testes.**

            ### Como instalar no Foundry VTT

            Foundry → **Módulos** → **Instalar Módulo** → cole a URL do manifesto:

            ```
            https://raw.githubusercontent.com/${{ github.repository }}/beta/module.json
            ```

            ### Como atualizar

            Se você já tem o módulo beta instalado, basta clicar em **Verificar Atualizações**
            no Foundry — ele baixará esta build automaticamente.
          prerelease: true
          files: aeris-bg3-rolls-t20-beta.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
